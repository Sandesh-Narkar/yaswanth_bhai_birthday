<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HBD 🎂</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --pink: #ff2d78;
            --yellow: #ffe135;
            --cyan: #00f0ff;
            --purple: #9b30ff;
            --bg: #0a0010;
            --glass: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: #fff;
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
        }

        /* Animated star bg */
        #stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a003a 0%, #0a0010 60%);
            overflow: hidden;
        }

        #stars::before,
        #stars::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, white, transparent),
                radial-gradient(1px 1px at 30% 80%, white, transparent),
                radial-gradient(1.5px 1.5px at 50% 10%, white, transparent),
                radial-gradient(1px 1px at 70% 55%, white, transparent),
                radial-gradient(1px 1px at 90% 30%, white, transparent),
                radial-gradient(1px 1px at 15% 65%, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(1px 1px at 55% 90%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 80% 75%, rgba(255, 255, 255, 0.7), transparent),
                radial-gradient(2px 2px at 40% 40%, rgba(255, 225, 53, 0.6), transparent),
                radial-gradient(2px 2px at 65% 15%, rgba(0, 240, 255, 0.5), transparent);
            animation: twinkle 3s infinite alternate;
        }

        #stars::after {
            background-position: 50px 50px;
            animation-duration: 4s;
            animation-delay: 1.5s;
        }

        @keyframes twinkle {
            from {
                opacity: 0.7
            }

            to {
                opacity: 1
            }
        }

        #bgVideo {
            position: fixed;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(30%) blur(6px) saturate(1.5);
        }

        /* PAGES */
        .page {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            z-index: 10;
        }

        .page.active {
            display: flex;
        }

        /* CARD */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 48px 40px;
            box-shadow: 0 0 60px rgba(155, 48, 255, 0.3), 0 0 120px rgba(255, 45, 120, 0.15);
            max-width: 420px;
            width: 90%;
        }

        /* PAGE 1 */
        .cake-emoji {
            font-size: 5rem;
            display: block;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-14px);
            }
        }

        #page1 h1 {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2rem, 6vw, 2.8rem);
            background: linear-gradient(90deg, var(--pink), var(--yellow), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 12px 0 8px;
        }

        #page1 p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            margin-bottom: 28px;
        }

        /* Buttons */
        .btn {
            padding: 14px 36px;
            border: none;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1.05rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn:hover {
            transform: scale(1.06);
        }

        .btn-yes {
            background: linear-gradient(135deg, var(--pink), var(--purple));
            color: #fff;
            box-shadow: 0 4px 24px rgba(255, 45, 120, 0.5);
        }

        .btn-start {
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            color: #fff;
            box-shadow: 0 4px 24px rgba(0, 240, 255, 0.4);
            margin-top: 8px;
        }

        /* PAGE 2 — Patiaaga */
        #page2 h2 {
            font-family: 'Pacifico', cursive;
            font-size: clamp(1.6rem, 5vw, 2.2rem);
            background: linear-gradient(90deg, var(--yellow), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        #page2 .subtitle {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        #noBtn {
            position: fixed;
            padding: 14px 30px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff4444, #ff0000);
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 0, 0, 0.5);
            transition: none;
            z-index: 999;
        }

        /* Funny NO messages */
        #noLabel {
            transition: none;
        }

        /* PAGE 3 — Scratch */
        #page3 h2 {
            font-family: 'Pacifico', cursive;
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        #page3 p {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.9rem;
            margin-bottom: 14px;
        }

        #scratchContainer {
            position: relative;
            width: 300px;
            height: 150px;
            margin: 10px auto 18px;
            border-radius: 15px;
            overflow: hidden;
        }

        .gift-reveal {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffe135, #ff2d78);
            color: #fff;
            font-weight: 900;
            font-size: 1.2rem;
            border-radius: 15px;
            font-family: 'Nunito', sans-serif;
        }

        .gift-reveal img {
            width: auto;
            height: 50vh;
        }

        #scratchCanvas {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 15px;
        }

        #page3 input {
            display: block;
            margin: 0 auto 14px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1.5px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            width: 220px;
            text-align: center;
            outline: none;
            font-family: 'Nunito', sans-serif;
            transition: border 0.2s;
        }

        #page3 input:focus {
            border-color: var(--cyan);
        }

        #page3 input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        #giftBtn {
            display: none;
            background: linear-gradient(135deg, var(--yellow), var(--pink));
            color: #fff;
            box-shadow: 0 4px 24px rgba(255, 225, 53, 0.4);
        }

        /* PAGE 4 — Fullscreen video */
        #page4 {
            background: #000;
            z-index: 20;
        }

        #page4 video {
            width: 50vw;
            height: 90vh;
            object-fit: cover;
            display: block;
        }

        /* Shimmer line */
        .shimmer-line {
            width: 60px;
            height: 3px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            margin: 12px auto 20px;
        }

        /* Floating emoji bg decorations */
        .float-bg {
            position: fixed;
            pointer-events: none;
            z-index: 5;
            font-size: 2rem;
            opacity: 0.12;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(110vh) rotate(0deg);
                opacity: 0.1;
            }

            50% {
                opacity: 0.18;
            }

            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* NO button panic counter */
        #panicMsg {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 30px;
            padding: 6px 20px;
            color: #ff6666;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <div id="stars"></div>

    <video autoplay muted loop id="bgVideo">
        <source src="bg.mp4" type="video/mp4" />
    </video>

    <!-- Floating decorations -->
    <span class="float-bg" style="left:5%; animation-duration:9s; animation-delay:0s;">🎂</span>
    <span class="float-bg" style="left:25%; animation-duration:12s; animation-delay:2s;">🎉</span>
    <span class="float-bg" style="left:50%; animation-duration:8s; animation-delay:5s;">🎈</span>
    <span class="float-bg" style="left:75%; animation-duration:11s; animation-delay:1s;">✨</span>
    <span class="float-bg" style="left:90%; animation-duration:10s; animation-delay:3s;">🥳</span>

    <!-- NO btn panic msg -->
    <div id="panicMsg">😱 LMAO YOU CAN'T CLICK NO — 0 attempts</div>

    <!-- PAGE 1 -->
    <div id="page1" class="page active">
        <div class="card">
            <span class="cake-emoji">🎂</span>
            <h1>HAPPY BIRTHDAY!</h1>
            <p>Something special is waiting for you&hellip;</p>
            <div class="shimmer-line"></div>
            <button class="btn btn-start" onclick="nextPage(2)">Let's Gooo 🚀</button>
        </div>
    </div>

    <!-- PAGE 2 -->
    <div id="page2" class="page">
        <div class="card">
            <h2>Party dega? 🍽️</h2>
            <p class="subtitle"> Dek party de raha hai ke nhi 👀</p>
            <button class="btn btn-yes" onclick="celebrate(3)">YES obviously 🎊</button>
            <br /><br />
            <small id="noHint" style="color:rgba(255,255,255,0.3); font-size:0.8rem;">
                (there's supposed to be a NO button here 😂)
            </small>
        </div>

        <!-- The escaping NO button -->
        <button id="noBtn" onclick="noClicked()">NO 😤</button>
    </div>

    <!-- PAGE 3 -->
    <div id="page3" class="page">
        <div class="card">
            <h2>Scratch to Reveal 🎁</h2>
            <p>Scratch the card, then enter your name</p>

            <div id="scratchContainer">
                <div class="gift-reveal"><img src="WhatsApp Image 2026-04-08 at 1.38.50 PM.jpeg"></div>
                <canvas id="scratchCanvas" width="300" height="150"></canvas>
            </div>

            <input type="text" id="nameInput" placeholder="Type your name here ✍️" />
            <button id="giftBtn" class="btn" onclick="validateAndGo()">Open Gift 🎁</button>
        </div>
    </div>

    <!-- PAGE 4 -->
    <div id="page4" class="page">
        <video id="giftVideo" autoplay controls playsinline>
            <source src="WhatsApp Video 2026-04-08 at 1.38.18 PM.mp4" type="video/mp4" />
        </video>
    </div>

    <script>
        /* PAGE NAVIGATION */
        function nextPage(p) {
            document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
            document.getElementById('page' + p).classList.add('active');
            if (p === 3) initScratch();
        }

        /* CONFETTI */
        function celebrate(p) {
            confetti({ particleCount: 200, spread: 80 });
            setTimeout(() => nextPage(p), 1000);
        }

        /* NO BUTTON (CONTROLLED ESCAPE) */
        const noBtn = document.getElementById('noBtn');
        let attempts = 0;

        function moveNoBtn() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        noBtn.addEventListener('mouseover', moveNoBtn);
        noBtn.addEventListener('click', moveNoBtn);

        /* Activate NO button only on page2 */
        function showNoBtn() {
            noBtn.style.display = "block";
            moveNoBtn();
        }

        /* Override nextPage to control NO button */
        const oldNext = nextPage;
        nextPage = function (p) {
            oldNext(p);
            if (p === 2) showNoBtn();
            else noBtn.style.display = "none";
        };

        /* SCRATCH CARD (SIMPLIFIED) */
        function initScratch() {
            const canvas = document.getElementById('scratchCanvas');
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = "#999";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let drawing = false;

            canvas.addEventListener('mousedown', () => drawing = true);
            canvas.addEventListener('mouseup', () => drawing = false);
            canvas.addEventListener('mousemove', scratch);

            canvas.addEventListener('touchstart', () => drawing = true);
            canvas.addEventListener('touchend', () => drawing = false);
            canvas.addEventListener('touchmove', scratch);

            function scratch(e) {
                if (!drawing) return;

                const rect = canvas.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;

                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fill();

                revealCheck();
            }

            function revealCheck() {
                const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let cleared = 0;

                for (let i = 3; i < pixels.length; i += 4) {
                    if (pixels[i] === 0) cleared++;
                }

                if (cleared > pixels.length / 8) {
                    document.getElementById('giftBtn').style.display = "inline-block";
                }
            }
        }

        /* VALIDATION */
        function validateAndGo() {
            const name = document.getElementById('nameInput').value.trim().toLowerCase();

            if (name === 'yaswanth') {
                confetti({ particleCount: 300, spread: 100 });
                setTimeout(() => {
                    nextPage(4);
                    document.getElementById('giftVideo').play();
                }, 800);
            } else {
                alert("Incorrect name");
            }
        }

        /* ENTER KEY */
        document.getElementById('nameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') validateAndGo();
        });
    </script>
</body>

</html>
